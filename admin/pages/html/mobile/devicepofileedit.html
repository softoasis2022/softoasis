<main>
    <form action="/admin/mobile/deviceedit" method="post">
        <select name="brand" id="brand">
            <option value="samsung">삼성</option>
            <option value="apple">애플</option>
        </select>
        <input type="text" name="series" placeholder="시리즈">
        <input type="text" name="modelname" placeholder="모델이름">
        <input type="text" name="modelcode" placeholder="모델코드">
        <select name="storage" id="storage">
            <option value="64GB">64GB</option>
            <option value="128GB">128GB</option>
            <option value="256GB">256GB</option>
            <option value="512GB">512GB</option>
            <option value="1TB">1TB</option>
        </select>
        <input type="number" name="price" placeholder="가격">
        <button type="submit">입력하기</button>
    </form>
</main>
