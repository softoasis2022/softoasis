<main>
    <link rel="stylesheet" href="./css/deviceprofileregister.css">
    <div class="filter">
        <!-- 브랜드 -->
        <select name="brand" id="brand">
            <option value="">브랜드 전체</option>
            <option value="samsung">삼성</option>
            <option value="apple">애플</option>
            <option value="lg">LG</option>
            <option value="xiaomi">샤오미</option>
            <option value="google">구글</option>
        </select>

        <!-- 기기유형 -->
        <select name="type" id="type">
            <option value="">기기유형 전체</option>
            <option value="smartphone">스마트폰</option>
            <option value="tablet">태블릿</option>
            <option value="earphone">이어폰</option>
            <option value="laptop">노트북</option>
            <option value="watch">워치</option>
            <option value="router">라우터</option>
            <option value="kids">키즈폰</option>
        </select>
        <input type="number" name="price" placeholder="가격" required>

        <!-- 통신망 -->
        <select name="network" id="network">
            <option value="">통신망</option>
            <option value="4g">4G (LTE)</option>
            <option value="5g">5G</option>
            <option value="wifi">Wi-Fi Only</option>
        </select>

        <!-- 출시년도 -->
        <select name="year" id="year">
            <option value="">출시년도</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
        </select>

        <!-- 출시 월 -->
        <select name="month" id="month">
            <option value="">출시 월</option>
            <option value="01">1월</option>
            <option value="02">2월</option>
            <option value="03">3월</option>
            <option value="04">4월</option>
            <option value="05">5월</option>
            <option value="06">6월</option>
            <option value="07">7월</option>
            <option value="08">8월</option>
            <option value="09">9월</option>
            <option value="10">10월</option>
            <option value="11">11월</option>
            <option value="12">12월</option>
        </select>

        <!-- 출시 일 -->
        <select name="day" id="day">
            <option value="">출시 일</option>
            <!-- 1~31 -->
            <!-- 필요 시 JS로 자동 생성 가능 -->
            <option value="01">1일</option>
            <option value="02">2일</option>
            <option value="03">3일</option>
            <option value="04">4일</option>
            <option value="05">5일</option>
            <option value="06">6일</option>
            <option value="07">7일</option>
            <option value="08">8일</option>
            <option value="09">9일</option>
            <option value="10">10일</option>
            <option value="11">11일</option>
            <option value="12">12일</option>
            <option value="13">13일</option>
            <option value="14">14일</option>
            <option value="15">15일</option>
            <option value="16">16일</option>
            <option value="17">17일</option>
            <option value="18">18일</option>
            <option value="19">19일</option>
            <option value="20">20일</option>
            <option value="21">21일</option>
            <option value="22">22일</option>
            <option value="23">23일</option>
            <option value="24">24일</option>
            <option value="25">25일</option>
            <option value="26">26일</option>
            <option value="27">27일</option>
            <option value="28">28일</option>
            <option value="29">29일</option>
            <option value="30">30일</option>
            <option value="31">31일</option>
        </select>

        <!-- RAM -->
        <select name="ram" id="ram">
            <option value="">RAM</option>
            <option value="4">4GB</option>
            <option value="6">6GB</option>
            <option value="8">8GB</option>
            <option value="12">12GB</option>
            <option value="16">16GB</option>
        </select>

        <!-- 저장용량 -->
        <select name="storage" id="storage">
            <option value="">저장용량</option>
            <option value="64">64GB</option>
            <option value="128">128GB</option>
            <option value="256">256GB</option>
            <option value="512">512GB</option>
            <option value="1024">1TB</option>
        </select>

        <!-- 5G 지원 -->
        <select name="fiveg" id="fiveg">
            <option value="">5G 지원</option>
            <option value="yes">지원</option>
            <option value="no">미지원</option>
        </select>

        <!-- eSIM -->
        <select name="esim" id="esim">
            <option value="">eSIM</option>
            <option value="yes">지원</option>
            <option value="no">미지원</option>
        </select>

        <!-- 상태 -->
        <select name="condition" id="condition">
            <option value="">제품상태</option>
            <option value="new">새상품</option>
            <option value="used">중고</option>
            <option value="refurb">리퍼</option>
            <option value="demo">전시상품</option>
        </select>
    </div>
</main>
