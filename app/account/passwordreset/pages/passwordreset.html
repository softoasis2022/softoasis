<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 변경</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./reset.js" defer></script>
    <link rel="icon" type="image/png" href="/image/UI/neologo.svg">
</head>

<body>

    <main class="login_container">

        <div class="wrap_login">

            <!-- 🔥 로고 -->
            <div class="logo">
                <div class="circle"></div>
                <div class="slash"></div>
            </div>

            <!-- 타이틀 -->
            <h2 class="login_title">RESET NODE</h2>

            <!-- 설명 -->
            <p class="sub_text">
                새로운 비밀번호를 설정하세요
            </p>

            <!-- 폼 -->
            <form id="resetForm" class="login_form">

                <label>
                    새 비밀번호
                    <input type="password" id="newPassword" placeholder="새 비밀번호 입력" required />
                </label>

                <label>
                    비밀번호 확인
                    <input type="password" id="confirmPassword" placeholder="다시 입력" required />
                </label>

                <button type="submit" class="btn_login">
                    UPDATE NODE
                </button>

            </form>

            <!-- 하단 -->
            <div class="account">
                <a href="/acount/login">로그인으로 돌아가기</a>
            </div>

        </div>

    </main>

</body>

</html>
