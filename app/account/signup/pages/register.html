<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소프트오아시스 회원가입</title>

    <link rel="stylesheet" href="./background.css">
    <link rel="stylesheet" href="./logo.css">
    <link rel="stylesheet" href="./card.css">

    <!-- 🔥 defer 추가 -->
    <script src="./signup.js" defer></script>

    <link rel="icon" type="image/png" href="/image/UI/neologo.svg">
</head>

<body>

    <div class="app">

        <!-- 🔥 form 수정 -->
        <form class="card" id="signupForm" method="post">

            <!-- 로고 -->
            <div class="logo">
                <div class="circle"></div>
                <div class="slash"></div>
            </div>

            <!-- 타이틀 -->
            <div class="title">계정 만들기</div>

            <div class="input-box">
                <input type="text" id="userId" placeholder="USER ID" required>
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="PASSWORD" required>
            </div>

            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="CONFIRM PASSWORD" required>
            </div>

            <!-- 🔥 nickname 하나만 -->
            <div class="input-box">
                <input type="text" id="nickname" placeholder="NICKNAME" required>
            </div>

            <div class="input-box">
                <input type="text" id="phonenumber" placeholder="핸드폰번호" required>
            </div>

            <!-- 🔥 버튼 type 지정 -->
            <button type="button" class="signup-btn" id="numbercheck">번호인증</button>
            <button type="button" class="signup-btn" id="signupBtn">가입하기</button>

            <!-- 하단 -->
            <div class="account">
                <a href="/acount/login">로그인</a>
                <span>|</span>
                <a href="/acount/find">아이디 / 비밀번호 찾기</a>
            </div>

        </form>

    </div>

</body>

</html>
