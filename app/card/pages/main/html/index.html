<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드</title>
</head>

<body>
    <main>
        <section class="cardlist" style="display: grid;">
            <div>
                <p>출시된 카드</p>
            </div>
            <div class="cardinfo"
                style="padding: 10px; display: flex; flex-direction: column; gap: 10px; width: fit-content; justify-content: center; align-items: center; border: 1px solid black;">
                <a href="https://www.softoasis.org">
                    <div class="card"
                        style="width: 200px; height: 300px; display: flex; border-radius: 10px; border: 1px solid black; ">
                        <p>카드 그림, 프로토타입 완성시 img 테그로 바뀜</p>
                    </div>
                </a>
                <div>
                    <p>카드 이름</p>
                </div>
                <div>
                    <p>카드 설명</p>
                </div>
            </div>
        </section>
        <section class="collection">
            <div>
                <p>컬렉션 카드</p>
            </div>
            <div class="cardinfo"
                style="padding: 10px; display: flex; flex-direction: column; gap: 10px; width: fit-content; justify-content: center; align-items: center; border: 1px solid black;">
                <div class="card"
                    style="width: 200px; height: 300px; display: flex; border-radius: 10px; border: 1px solid black; ">
                    <p>카드 그림, 프로토타입 완성시 img 테그로 바뀜</p>
                </div>
                <div>
                    <p>카드 이름</p>
                </div>
                <div>
                    <p>카드 설명</p>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
