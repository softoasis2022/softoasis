<main>
    <section class="join-card">

        <form id="deliveryForm" method="post">

            <span>이름</span>
            <input type="text" name="name" id="nameInput" placeholder="이름 입력" required>

            <span>전화번호</span>
            <input type="tel" name="phone" id="phoneInput" placeholder="01012345678" required>

            <span>주소</span>
            <input type="text" name="address" id="addressInput" placeholder="주소 입력" required readonly>
            <button type="button" class="find-btn" id="openPopupBtn">주소 찾기</button>

            <span>상세주소</span>
            <input type="text" name="subaddress" id="detailAddressInput" placeholder="상세 주소 입력" required>

            <span>요청사항</span>
            <input type="text" name="request" id="requestInput" placeholder="요청사항 입력">

            <button type="submit" class="submit-btn">신청하기</button>

        </form>
    </section>

    <!-- 🔥 주소 검색 팝업 -->
    <div class="popup" id="addressPopup" style="display:none;">
        <div class="popup-box">

            <div class="popup-header">
                <input type="text" id="searchInput" placeholder="장소 검색">
                <button id="searchBtn">검색</button>
                <button id="closeBtn">X</button>
            </div>

            <div style="display:flex; gap:10px;">

                <!-- 🔥 검색 결과 -->
                <div class="result-wrap">
                    <ul id="resultList">

                        <!-- 🔥 템플릿 (JS로 생성될 구조) -->
                        <!-- <li class="result-item">
                            <div class="result-info">
                                <p class="result-name">웰리치시지아파트 후문</p>
                                <p class="result-address">대구 수성구 욱수동</p>
                            </div>
                            <button class="select-btn">선택</button>
                        </li> -->

                    </ul>
                </div>

            </div>

        </div>
    </div>
</main>

<link rel="stylesheet" href="/shop/delivery/css/address.css">
<link rel="stylesheet" href="/shop/delivery/css/join.css">
<script src="/shop/delivery/js/address.js"></script>
