<main>
    <section id="cs">
        <form id="csForm" action="/softoasis/cs" method="post">

            <!-- 문의 유형 -->
            <div>
                <label>문의 유형</label>
                <select class="sellect_cs" name="type">
                    <option value="nomal">일반 문의</option>
                    <option value="tester">네오앱 테스터 신청</option>
                    <option value="bug">버그 제보</option>
                    <option value="account">계정 문의</option>
                    <option value="payment">결제 문의</option>
                    <option value="buisness">비즈니스 문의</option>
                    <option value="etc">기타</option>
                </select>
            </div>

            <!-- 제목 -->
            <div>
                <label>제목</label>
                <input type="text" name="title" placeholder="제목을 입력하세요">
            </div>

            <!-- 내용 -->
            <div>
                <label>문의 내용</label>
                <textarea name="content" rows="6" placeholder="내용을 입력하세요"
                    style="height: fit-content; min-height: 300px; resize: none;"></textarea>
            </div>

            <!-- 사용자 정보 -->
            <div>
                <label>이메일</label>
                <input type="email" name="email" placeholder="답변 받을 이메일">
            </div>
            <div>
                <label>전화번호</label>
                <input type="number" name="phonenumber" placeholder="답변 받을 전화번호">
            </div>

            <!-- 첨부 파일 -->
            <div>
                <label>첨부 파일</label>
                <input type="file" name="file">
            </div>

            <!-- 개인정보 동의 -->
            <div>
                <label style="display: flex; flex-direction: row; gap: 10px;">
                    <input type="checkbox" name="agree">
                    <p style="margin: 0px;">개인정보 수집 및 이용에 동의합니다</p>
                    <div onclick="info()"
                        style="width: fit-content; height: fit-content; border: 1px solid black; background-color: blueviolet;">
                        개인 정보 수집 내용 보기
                    </div>
                </label>
            </div>

            <!-- 제출 -->
            <div>
                <button type="submit">문의 보내기</button>
            </div>

        </form>
        <div class="wrap1" id="wrap1" style="display: none;">
            <div class="popup">

                <h3>개인정보 수집 및 이용 안내</h3>

                <div class="content">

                    <p><strong>1. 수집 목적</strong></p>
                    <p>
                        문의 접수 및 답변 제공, 서비스 개선을 위한 자료로 활용됩니다.
                    </p>

                    <p><strong>2. 수집 항목</strong></p>
                    <p>
                        이메일, 전화번호, 문의 내용, 첨부파일
                    </p>

                    <p><strong>3. 보유 기간</strong></p>
                    <p>
                        문의 처리 완료 후 최대 1년간 보관 후 파기합니다.
                    </p>

                    <p><strong>4. 동의 거부 권리</strong></p>
                    <p>
                        개인정보 제공에 동의하지 않을 수 있으나, 이 경우 문의 접수가 제한될 수 있습니다.
                    </p>

                    <p><strong>5. 제3자 제공</strong></p>
                    <p>
                        원칙적으로 외부에 제공되지 않으며, 법령에 의한 경우에만 예외적으로 제공될 수 있습니다.
                    </p>

                </div>

                <button class="closeBtn" onclick="info()">닫기</button>

            </div>
        </div>
    </section>

</main>
<link rel="stylesheet" href="/softoasis/css/cs/form.css">
<link rel="stylesheet" href="/softoasis/css/cs/main.css">
<link rel="stylesheet" href="/softoasis/css/cs/popup.css">
<script src="/softoasis/js/cs.js"></script>
