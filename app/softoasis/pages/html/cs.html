<main>
    <section id="cs">
        <form id="csForm" action="post" href="/softoasis/cs" style="width: fit-content; min-width: 600px; display: flex; flex-direction: column;">

            <!-- 문의 유형 -->
            <div>
                <label>문의 유형</label>
                <select class="sellect_cs" name="type">
                    <option value="nomal">일반 문의</option>
                    <option value="tester">네오앱 테스터 신청</option>
                    <option value="bug">버그 제보</option>
                    <option value="account">계정 문의</option>
                    <option value="payment">결제 문의</option>
                    <option value="buisness">비즈니스 문의</option>
                    <option value="etc">기타</option>
                </select>
            </div>

            <!-- 제목 -->
            <div>
                <label>제목</label>
                <input type="text" name="title" placeholder="제목을 입력하세요">
            </div>

            <!-- 내용 -->
            <div>
                <label>문의 내용</label>
                <textarea name="content" rows="6" placeholder="내용을 입력하세요" style="height: fit-content; min-height: 300px; resize: none;"></textarea>
            </div>

            <!-- 사용자 정보 -->
            <div>
                <label>이메일</label>
                <input type="email" name="email" placeholder="답변 받을 이메일">
            </div>
            <div>
                <label>전화번호</label>
                <input type="number" name="phonenumber" placeholder="답변 받을 전화번호">
            </div>

            <!-- 첨부 파일 -->
            <div>
                <label>첨부 파일</label>
                <input type="file" name="file">
            </div>

            <!-- 개인정보 동의 -->
            <div style="">
                <label>
                    <input  type="checkbox" name="agree">
                    개인정보 수집 및 이용에 동의합니다
                    <div onclick="info()" style="width: fit-content; border: 1px solid black;" >
                        개인 정보 수집 내용 보기
                    </div>
                </label>
            </div>

            <!-- 제출 -->
            <div>
                <button type="submit">문의 보내기</button>
            </div>

        </form>
        <div class="wrap1" id="wrap1" style="display: none;">
            <ul>
                <li>
                    <p>개인 정보 수집 내용</p>
                    <p></p>
                </li>
            </ul>
        </div>
    </section>

</main>
<style>
    section{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    form>div {
        display: flex;
        flex-direction: column;
        max-width: 800px;
    }
    .sellect_cs{
        gap: 10px;
    }
    .wrap1 > ul{
        
    }
</style>
<script>
    function info(){
        if(document.getElementById("wrap1").style.display === "block"){
            document.getElementById("wrap1").style.display = "none";
        }
        else{
            document.getElementById("wrap1").style.display = "block";
        }
        
    }
</script>
