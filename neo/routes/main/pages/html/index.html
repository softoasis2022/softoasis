<main>

        <h2>🌐 네오 월드</h2>
        <p>네오 월드에 오신 것을 환영합니다.</p>
        <p>타운에 있는 사람들과 어울려 정보를 공유하고, 당신의 삶에 새로운 액티비티를 추가해보세요.</p>

    <!-- 🔥 초대장 -->

        <div>
            <p>친구가 보낸 초대장을 확인하고 새로운 시티에 참여해보세요.</p>
        </div>
        <button onclick="location.href='/world/invite'">

        </div>
        <button onclick="location.href='/world/community'">
            커뮤니티 보기
        </button>
    </section>

            <p>시티에 있는 친구들을 둘러보고 새로운 인연을 만들어보세요.</p>
