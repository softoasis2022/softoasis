<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>엘레베이터</title>
    <style>
        main{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        ul {
            padding-inline-start: 0px;
            display: flex;
            flex-direction: column;
            
        }

        li {
            list-style: none;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid black;
            margin: 10px;
            max-width: 100px;
        }
        .btn_rayer{
            list-style: none;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid black;
            margin: 10px;
            max-width: 100px;
        }

        p {
            margin: 0px;
        }

        a {
            text-decoration: none;
            color: black;

        }
    </style>
</head>

<body>
    <main>
        <div>
            <p>층별안내판</p>
        </div>
        <section>
            <ul>
                <li>
                    <p>1층</p>
                    <ul>
                        <li>안내 데스크</li>
                    </ul>
                </li>
            </ul>
        </section>
        <section>
            <ul>
                <li class="btn_rayer">
                    <a href="#">1</a>
                </li>
                <li>
                    <a href="#">2</a>
                </li>
                <li>
                    <a href="#">3</a>
                </li>
                <li>
                    <a href="#">4</a>
                </li>
                <li>
                    <a href="#">5</a>
                </li>
                <li>
                    <a href="#">6</a>
                </li>
                <li>
                    <a href="#">7</a>
                </li>
                <li>
                    <a href="#">8</a>
                </li>
            </ul>
        </section>
    </main>
</body>

</html>
