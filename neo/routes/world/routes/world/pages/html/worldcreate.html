<main>

    <!-- =========================
        🌍 월드 생성
    ========================== -->
    <section class="worldsetup">

        <h2>🌍 월드 생성</h2>

        <form id="worldForm">

            <!-- 월드 이름 -->
            <label>월드 이름</label>
            <input type="text" name="worldName" placeholder="월드 이름 입력" required>

            <!-- 월드 크기 -->
            <label>월드 규모</label>
            <select name="size">
                <option value="9">9 x 9 (기본)</option>
                <option value="10">10 x 10 (추가금 있음)</option>
                <option value="11">11 x 11 (추가금 있음)</option>
                <option value="12">12 x 12 (추가금 있음)</option>
                <option value="13">13 x 13 (추가금 있음)</option>
                <option value="14">14 x 14 (추가금 있음)</option>
                <option value="15">15 x 15 (추가금 있음)</option>
                <option value="16">16 x 16 (추가금 있음)</option>
                <option value="17">17 x 17 (추가금 있음)</option>
                <option value="18">18 x 18 (추가금 있음)</option>
                <option value="19">19 x 19 (추가금 있음)</option>
                <option value="20">20 x 20 (추가금 있음)</option>
            </select>
            <small>중앙 타일 = 기본 역 자리</small>

            <!-- 최대 인원 -->
            <label>최대 시민 수</label>
            <input type="number" name="maxUsers" value="80" min="10" max="1000">

            <!-- 역 여부 -->
            <label>역 적용 여부</label>
            <select name="station">
                <option value="true">있음</option>
                <option value="false">없음</option>
            </select>

            <!-- 타입 -->
            <label>월드 타입</label>
            <select name="type" id="typeSelect">
                <option value="">타입 선택</option>
                <option value="real_city">🏙 실제 도시</option>
                <option value="virtual_city">🧩 가상 도시</option>
                <option value="user_world">👤 유저 월드</option>
                <option value="official_world">🏢 공식 월드</option>
            </select>

            <button type="submit">월드 만들기</button>

        </form>
    </section>


    <!-- =========================
        💳 결제
    ========================== -->
    <section class="worldpayment">

        <h2>💳 결제</h2>

        <form id="paymentForm">

            <label>상품명</label>
            <input type="text" name="product" value="월드 생성 이용권" readonly>

            <label>금액</label>
            <input type="number" name="price" value="5000" readonly>

            <button type="submit">결제 하기</button>

        </form>

    </section>

</main>
<script src="/world/js/worldcreate.js"></script>
