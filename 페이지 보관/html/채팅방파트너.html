<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>채팅방 파트너</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#0f1a2e;
      --card2:#0d172a;
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --brand:#7aa7ff;
      --brand2:#9c7bff;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
      --radius:18px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, "Noto Sans KR", sans-serif;
      color:var(--text);
      background:
        radial-gradient(1000px 600px at 20% -10%, rgba(122,167,255,.28), transparent 60%),
        radial-gradient(900px 600px at 90% 0%, rgba(156,123,255,.24), transparent 60%),
        radial-gradient(1200px 700px at 40% 120%, rgba(0,255,210,.10), transparent 60%),
        var(--bg);
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:20px 14px 40px;
    }

    .app{
      width:min(980px, 100%);
      display:grid;
      gap:16px;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding:16px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-radius:var(--radius);
      box-shadow: var(--shadow);
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .title h1{
      margin:0;
      font-size:18px;
      letter-spacing:-.2px;
    }
    .title p{
      margin:0;
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      color:var(--muted);
      font-size:12px;
      background:rgba(255,255,255,.02);
      user-select:none;
    }
    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow:0 0 0 4px rgba(122,167,255,.12);
    }

    .layout{
      display:grid;
      grid-template-columns: 320px 1fr;
      gap:16px;
      align-items:start;
    }

    @media (max-width: 860px){
      .layout{ grid-template-columns: 1fr; }
    }

    .panel{
      border:1px solid var(--line);
      background:rgba(255,255,255,.02);
      border-radius:var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .panelHeader{
      padding:14px 14px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    }

    .panelHeader h2{
      margin:0;
      font-size:14px;
      color:rgba(255,255,255,.88);
      letter-spacing:-.2px;
    }

    .search{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:rgba(0,0,0,.12);
    }
    .search input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      color:var(--text);
      outline:none;
      font-size:13px;
    }
    .search input::placeholder{ color: rgba(255,255,255,.45); }

    .list{
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height: 520px;
      overflow:auto;
    }

    .partnerBtn{
      width:100%;
      text-align:left;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.02);
      color:var(--text);
      cursor:pointer;
      transition: transform .06s ease, border-color .15s ease, background .15s ease;
    }
    .partnerBtn:hover{
      border-color: rgba(122,167,255,.35);
      background: rgba(122,167,255,.08);
    }
    .partnerBtn:active{ transform: scale(.99); }
    .partnerBtn[aria-selected="true"]{
      border-color: rgba(122,167,255,.65);
      background: rgba(122,167,255,.14);
      box-shadow: 0 10px 20px rgba(122,167,255,.10);
    }

    .partnerLeft{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width: 0;
    }
    .partnerName{
      font-size:13px;
      font-weight:650;
      letter-spacing:-.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .partnerMeta{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .badge{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      color:rgba(255,255,255,.72);
      background:rgba(255,255,255,.03);
      flex:0 0 auto;
    }

    /* 브랜드 그리드 */
    .brandsWrap{
      padding:14px;
    }

    .brandsTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .brandsTop .hint{
      font-size:12px;
      color:var(--muted);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 980px){ .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 520px){ .grid{ grid-template-columns: 1fr; } }

    .brandCard{
      border:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition: transform .06s ease, border-color .15s ease, background .15s ease;
      min-height: 140px;
      display:flex;
      flex-direction:column;
    }
    .brandCard:hover{
      border-color: rgba(156,123,255,.45);
      background: rgba(156,123,255,.08);
    }
    .brandCard:active{ transform: scale(.99); }

    .thumb{
      height:86px;
      background:
        radial-gradient(120px 80px at 30% 30%, rgba(122,167,255,.35), transparent 65%),
        radial-gradient(140px 90px at 70% 40%, rgba(156,123,255,.30), transparent 65%),
        rgba(255,255,255,.03);
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.60);
      font-size:12px;
    }
    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .cardBody{
      padding:10px 10px 12px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .brandTitle{
      font-size:13px;
      font-weight:700;
      letter-spacing:-.2px;
      margin:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brandSub{
      margin:0;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
      height: 2.7em;
      overflow:hidden;
    }

    .footerBar{
      margin-top:12px;
      padding:12px 14px;
      border-top:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:rgba(0,0,0,.10);
    }

    .btn{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.03);
      color:var(--text);
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-size:13px;
      transition: transform .06s ease, background .15s ease, border-color .15s ease;
    }
    .btn:hover{ border-color: rgba(122,167,255,.45); background: rgba(122,167,255,.10); }
    .btn:active{ transform: scale(.99); }

    .primary{
      border-color: rgba(122,167,255,.55);
      background: linear-gradient(135deg, rgba(122,167,255,.18), rgba(156,123,255,.14));
    }

    .empty{
      padding:20px 0;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <h1>채팅방 파트너</h1>
        <p>해당 채팅방과 계약된 파트너(판매사/브랜드/콘텐츠사)를 선택하고, 제공 브랜드를 확인하세요.</p>
      </div>
      <div class="chip" title="예시 화면">
        <span class="dot"></span>
        <span>Room #No.1 · Demo</span>
      </div>
    </div>

    <div class="layout">
      <!-- 왼쪽: 파트너 선택 -->
      <section class="panel" aria-label="파트너 선택">
        <div class="panelHeader">
          <h2>파트너 유형 선택</h2>
          <span class="badge" id="partnerCount">0</span>
        </div>
        <div class="search">
          <input id="partnerSearch" type="text" placeholder="파트너 검색 (예: 상품, 판매사, 브랜드…)" autocomplete="off"/>
        </div>
        <div class="list" id="partnerList" role="listbox" aria-label="파트너 목록"></div>
      </section>

      <!-- 오른쪽: 브랜드 카드 -->
      <section class="panel" aria-label="브랜드 목록">
        <div class="panelHeader">
          <h2 id="brandsTitle">브랜드</h2>
          <span class="badge" id="brandCount">0</span>
        </div>

        <div class="brandsWrap">
          <div class="brandsTop">
            <div class="hint" id="brandsHint">왼쪽에서 파트너를 선택하면 브랜드가 표시됩니다.</div>
            <button class="btn" id="shuffleBtn" type="button">예시 섞기</button>
          </div>

          <div class="grid" id="brandGrid"></div>

          <div class="footerBar">
            <div class="hint" id="footerHint">브랜드 카드를 누르면 상세보기로 이동하는 흐름을 연결할 수 있어요.</div>
            <button class="btn primary" id="goDetailBtn" type="button">선택한 브랜드 보기 →</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    // ✅ 예시 데이터 (나중에 서버에서 내려받은 데이터로 교체)
    const DATA = [
      {
        partnerType: "상품",
        partnerName: "상품 파트너",
        desc: "해당 채팅방에서 노출 가능한 상품 파트너",
        brands: [
          { id: "p-1", title: "로우키", sub: "성수동 카페 · 커피/디저트", img: "" },
          { id: "p-2", title: "블루보틀", sub: "카페 · 커피", img: "" },
          { id: "p-3", title: "BHC", sub: "치킨 · 메뉴: 뿌링클", img: "" },
          { id: "p-4", title: "넷플릭스", sub: "콘텐츠 · 신작 추천", img: "" },
          { id: "p-5", title: "아이폰", sub: "디바이스 · 신제품 화제", img: "" },
          { id: "p-6", title: "로스터리 마켓", sub: "커피 원두/장비", img: "" },
        ],
      },
      {
        partnerType: "판매사",
        partnerName: "판매사 파트너",
        desc: "판매사가 계약한 브랜드 리스트",
        brands: [
          { id: "s-1", title: "SoftOasis 셀러", sub: "셀러 전용 브랜드 묶음", img: "" },
          { id: "s-2", title: "안동 마켓", sub: "지역 판매자 연합", img: "" },
          { id: "s-3", title: "기기샵", sub: "디바이스/액세서리", img: "" },
          { id: "s-4", title: "카페마루", sub: "음료/디저트", img: "" },
          { id: "s-5", title: "레시피 스토어", sub: "레시피/식재료", img: "" },
        ],
      },
      {
        partnerType: "브랜드",
        partnerName: "브랜드 파트너",
        desc: "브랜드사가 직접 계약한 목록",
        brands: [
          { id: "b-1", title: "로우키", sub: "성수 카페", img: "" },
          { id: "b-2", title: "블루보틀", sub: "카페", img: "" },
          { id: "b-3", title: "BHC", sub: "치킨", img: "" },
          { id: "b-4", title: "Apple", sub: "아이폰", img: "" },
          { id: "b-5", title: "Netflix", sub: "콘텐츠", img: "" },
          { id: "b-6", title: "Maru Industry", sub: "오프라인/로컬", img: "" },
        ],
      },
      {
        partnerType: "오픈라이선스 마켓",
        partnerName: "오픈라이선스 마켓",
        desc: "누구나 참여 가능한 공개 파트너",
        brands: [
          { id: "o-1", title: "오픈마켓 A", sub: "공개 참여", img: "" },
          { id: "o-2", title: "오픈마켓 B", sub: "공개 참여", img: "" },
          { id: "o-3", title: "오픈마켓 C", sub: "공개 참여", img: "" },
        ],
      },
    ];

    const partnerListEl = document.getElementById("partnerList");
    const partnerSearchEl = document.getElementById("partnerSearch");
    const partnerCountEl = document.getElementById("partnerCount");

    const brandGridEl = document.getElementById("brandGrid");
    const brandsTitleEl = document.getElementById("brandsTitle");
    const brandCountEl = document.getElementById("brandCount");
    const brandsHintEl = document.getElementById("brandsHint");

    const shuffleBtn = document.getElementById("shuffleBtn");
    const goDetailBtn = document.getElementById("goDetailBtn");

    let selectedPartnerIndex = 0;
    let selectedBrandId = null;
    let filteredPartners = [...DATA];

    function renderPartners() {
      partnerListEl.innerHTML = "";
      partnerCountEl.textContent = filteredPartners.length;

      if (filteredPartners.length === 0) {
        partnerListEl.innerHTML = `<div class="empty">검색 결과가 없어요.</div>`;
        return;
      }

      filteredPartners.forEach((p, idx) => {
        const isSelected = idx === selectedPartnerIndex;
        const btn = document.createElement("button");
        btn.className = "partnerBtn";
        btn.type = "button";
        btn.setAttribute("role", "option");
        btn.setAttribute("aria-selected", String(isSelected));

        btn.innerHTML = `
          <div class="partnerLeft">
            <div class="partnerName">${p.partnerType}</div>
            <div class="partnerMeta">${p.desc}</div>
          </div>
          <div class="badge">${p.brands.length}개</div>
        `;

        btn.addEventListener("click", () => {
          selectedPartnerIndex = idx;
          selectedBrandId = null;
          renderPartners();
          renderBrands();
        });

        partnerListEl.appendChild(btn);
      });
    }

    function renderBrands() {
      const partner = filteredPartners[selectedPartnerIndex];
      if (!partner) {
        brandsTitleEl.textContent = "브랜드";
        brandCountEl.textContent = "0";
        brandsHintEl.textContent = "왼쪽에서 파트너를 선택하면 브랜드가 표시됩니다.";
        brandGridEl.innerHTML = `<div class="empty">표시할 파트너가 없어요.</div>`;
        return;
      }

      brandsTitleEl.textContent = `${partner.partnerType} · 브랜드`;
      brandCountEl.textContent = partner.brands.length;
      brandsHintEl.textContent = `선택된 파트너: ${partner.partnerName} (카드를 눌러 선택)`;

      brandGridEl.innerHTML = "";
      partner.brands.forEach((b) => {
        const card = document.createElement("div");
        card.className = "brandCard";
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `${b.title} 선택`);

        const thumbHtml = b.img
          ? `<img alt="${b.title}" src="${b.img}">`
          : `<div class="thumb">이미지</div>`;

        card.innerHTML = `
          ${b.img ? `<div class="thumb">${thumbHtml}</div>` : thumbHtml}
          <div class="cardBody">
            <p class="brandTitle">${b.title}</p>
            <p class="brandSub">${b.sub}</p>
          </div>
        `;

        const select = () => {
          selectedBrandId = b.id;
          // 선택 표시(간단 강조)
          [...brandGridEl.children].forEach(el => el.style.outline = "none");
          card.style.outline = "2px solid rgba(122,167,255,.75)";
          card.style.outlineOffset = "2px";
        };

        card.addEventListener("click", select);
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            select();
          }
        });

        brandGridEl.appendChild(card);
      });
    }

    function applyPartnerSearch() {
      const q = (partnerSearchEl.value || "").trim().toLowerCase();
      if (!q) {
        filteredPartners = [...DATA];
      } else {
        filteredPartners = DATA.filter(p =>
          (p.partnerType || "").toLowerCase().includes(q) ||
          (p.partnerName || "").toLowerCase().includes(q) ||
          (p.desc || "").toLowerCase().includes(q)
        );
      }
      selectedPartnerIndex = 0;
      selectedBrandId = null;
      renderPartners();
      renderBrands();
    }

    function shuffleBrands() {
      const partner = filteredPartners[selectedPartnerIndex];
      if (!partner) return;
      // 간단 섞기
      partner.brands.sort(() => Math.random() - 0.5);
      selectedBrandId = null;
      renderBrands();
    }

    partnerSearchEl.addEventListener("input", applyPartnerSearch);
    shuffleBtn.addEventListener("click", shuffleBrands);

    goDetailBtn.addEventListener("click", () => {
      const partner = filteredPartners[selectedPartnerIndex];
      if (!partner) return alert("파트너를 먼저 선택해주세요.");
      if (!selectedBrandId) return alert("브랜드 카드를 하나 선택해주세요.");

      const selected = partner.brands.find(b => b.id === selectedBrandId);
      alert(`선택한 브랜드: ${selected?.title || "(알 수 없음)"}\n여기에 상세 페이지 이동/모달을 연결하면 됩니다.`);
    });

    // 초기 렌더
    renderPartners();
    renderBrands();
  </script>
</body>
</html>
