<!-- ticket_use.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SoftOasis - 사용방식 선택</title>
  <style>
    :root{
      --bg1:#070A12; --bg2:#0B1022;
      --line:rgba(255,255,255,.10);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --neon:#7C5CFF;
      --neon2:#00E6FF;
      --danger:#FF4D7D;
      --ok:#33D69F;
      --shadow: 0 14px 40px rgba(0,0,0,.45);
      --r:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", Arial;
      background: radial-gradient(1100px 700px at 20% 10%, rgba(124,92,255,.26), transparent 60%),
                  radial-gradient(900px 650px at 90% 30%, rgba(0,230,255,.18), transparent 55%),
                  linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
    }
    .wrap{max-width:980px; margin:0 auto; padding:28px 16px 40px}
    header{display:flex; align-items:flex-end; justify-content:space-between; gap:12px; margin-bottom:18px}
    .title h1{margin:0; font-size:22px}
    .title p{margin:6px 0 0; color:var(--muted); font-size:13px}
    .badge{
      padding:10px 12px; border:1px solid var(--line); border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow: 0 10px 22px rgba(0,0,0,.25);
      color:var(--muted); font-size:12px;
    }
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .hd{
      padding:14px 16px; border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      background:linear-gradient(180deg, rgba(124,92,255,.12), rgba(0,230,255,.06));
    }
    .hd strong{font-size:14px}
    .bd{padding:14px 16px}

    .summary{
      display:grid; grid-template-columns: 1fr 1fr; gap:10px;
      margin-bottom:12px;
    }
    @media (max-width:780px){ .summary{grid-template-columns:1fr} }
    .pill{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:rgba(0,0,0,.18);
      color:rgba(255,255,255,.86);
      font-size:13px;
      display:flex; justify-content:space-between; gap:10px;
    }
    .pill span{color:var(--muted)}

    .tickets{display:flex; flex-direction:column; gap:10px}
    .ticket{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.10));
    }
    .top{display:flex; justify-content:space-between; align-items:center; gap:10px}
    .num{font-weight:900}
    .mini{color:var(--muted); font-size:12px}

    .toggle{
      display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;
    }
    .seg{
      flex:1;
      min-width:140px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      cursor:pointer;
      background:rgba(255,255,255,.04);
      color:rgba(255,255,255,.85);
      font-weight:800;
      text-align:center;
      user-select:none;
    }
    .seg.active{
      border-color: rgba(0,230,255,.55);
      background: linear-gradient(90deg, rgba(0,230,255,.20), rgba(124,92,255,.20));
      box-shadow: 0 10px 26px rgba(0,230,255,.14);
      color: rgba(255,255,255,.95);
    }

    .giftBox{
      margin-top:10px;
      padding:12px;
      border-radius:14px;
      border:1px dashed rgba(255,255,255,.18);
      background:rgba(124,92,255,.08);
      display:none;
    }
    .giftBox.show{display:block}
    label{display:block; font-size:12px; color:var(--muted); margin:10px 0 6px}
    input, textarea{
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(8,12,24,.55);
      color:var(--text);
      outline:none;
      resize:vertical;
    }

    .actions{
      margin-top:14px;
      display:flex; gap:10px;
    }
    .btn{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      cursor:pointer;
      font-weight:900;
      letter-spacing:.2px;
    }
    .btn.primary{
      border-color: rgba(0,230,255,.45);
      background: linear-gradient(90deg, rgba(0,230,255,.22), rgba(124,92,255,.22));
      box-shadow: 0 10px 26px rgba(0,230,255,.14);
    }
    .btn.ghost{
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.85);
    }

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }
    .error{
      margin-top:10px;
      color: rgba(255,255,255,.9);
      font-size:12px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,77,125,.35);
      background: rgba(255,77,125,.10);
      display:none;
    }
    .error.show{display:block}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>티켓 사용방식 선택</h1>
        <p>구매한 티켓(수량)별로 “개인 사용 / 선물”을 지정합니다.</p>
      </div>
      <div class="badge">Step 2 • Mode Select</div>
    </header>

    <section class="card">
      <div class="hd">
        <strong>구매 요약</strong>
        <span class="mini">선물 티켓은 “받는 사람”이 필수입니다</span>
      </div>
      <div class="bd">
        <div class="summary" id="summary"></div>

        <div class="tickets" id="tickets"></div>

        <div class="error" id="errorBox"></div>

        <div class="actions">
          <button class="btn ghost" id="backBtn" type="button">이전(구매 화면)</button>
          <button class="btn primary" id="payBtn" type="button">결제 화면으로</button>
        </div>

        <div class="hint">
          지금은 “결제 화면”은 다음 단계로 넘기기만 합니다. (네가 원하면 3번째 결제 HTML도 바로 만들어줄게)
        </div>
      </div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    function fmt(n){
      if (!Number.isFinite(n)) return "-";
      return n.toLocaleString("ko-KR") + "원";
    }

    const buyRaw = localStorage.getItem("SO_TICKET_BUY");
    if (!buyRaw){
      alert("구매 정보가 없습니다. 구매 화면으로 이동합니다.");
      location.href = "ticket_buy.html";
    }

    const buy = JSON.parse(buyRaw);

    // 티켓별 사용 방식 상태
    const tickets = Array.from({length: buy.qty}, (_, i) => ({
      ticketNo: i + 1,
      mode: "SELF", // SELF | GIFT
      receiver: "", // 선물일 때 필수
      message: ""
    }));

    function renderSummary(){
      const el = $("summary");
      el.innerHTML = `
        <div class="pill"><span>월드</span><b>${buy.worldId}</b></div>
        <div class="pill"><span>역</span><b>${buy.stationId}</b></div>
        <div class="pill"><span>수량</span><b>${buy.qty}장</b></div>
        <div class="pill"><span>총 결제금액</span><b>${fmt(buy.totalPrice)}</b></div>
      `;
    }

    function renderTickets(){
      const wrap = $("tickets");
      wrap.innerHTML = "";

      tickets.forEach((t, idx) => {
        const div = document.createElement("div");
        div.className = "ticket";
        div.dataset.idx = idx;

        div.innerHTML = `
          <div class="top">
            <div>
              <div class="num">티켓 #${t.ticketNo}</div>
              <div class="mini">${buy.worldId} · ${buy.stationId} · 1장 · ${fmt(buy.unitPrice)}</div>
            </div>
            <div class="mini">${t.mode === "SELF" ? "내 지갑 저장" : "선물 발송 예정"}</div>
          </div>

          <div class="toggle">
            <div class="seg ${t.mode === "SELF" ? "active" : ""}" data-action="self">개인 사용</div>
            <div class="seg ${t.mode === "GIFT" ? "active" : ""}" data-action="gift">표 선물</div>
          </div>

          <div class="giftBox ${t.mode === "GIFT" ? "show" : ""}">
            <label>받는 사람(닉네임/유저ID/전화번호)</label>
            <input type="text" value="${escapeHtml(t.receiver)}" placeholder="예) teamin 또는 010-0000-0000" data-field="receiver" />
            <label>메시지(선택)</label>
            <textarea rows="2" placeholder="짧은 메시지를 남길 수 있어요" data-field="message">${escapeHtml(t.message)}</textarea>
          </div>
        `;

        div.addEventListener("click", (e) => {
          const act = e.target?.dataset?.action;
          if (!act) return;

          if (act === "self"){
            t.mode = "SELF";
          } else if (act === "gift"){
            t.mode = "GIFT";
          }
          renderTickets();
        });

        // input 변경 반영
        div.addEventListener("input", (e) => {
          const field = e.target?.dataset?.field;
          if (!field) return;
          t[field] = e.target.value;
        });

        wrap.appendChild(div);
      });
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function validate(){
      const giftMissing = tickets
        .filter(t => t.mode === "GIFT")
        .filter(t => !String(t.receiver).trim());

      if (giftMissing.length > 0){
        return `선물로 지정된 티켓 중 “받는 사람”이 비어있습니다: ${giftMissing.map(t=>"#"+t.ticketNo).join(", ")}`;
      }
      return "";
    }

    $("backBtn").addEventListener("click", () => {
      location.href = "ticket_buy.html";
    });

    $("payBtn").addEventListener("click", () => {
      const err = validate();
      const errorBox = $("errorBox");

      if (err){
        errorBox.textContent = err;
        errorBox.classList.add("show");
        window.scrollTo({top: document.body.scrollHeight, behavior:"smooth"});
        return;
      }
      errorBox.classList.remove("show");

      const payload = {
        ...buy,
        tickets,
        counts: {
          self: tickets.filter(t => t.mode === "SELF").length,
          gift: tickets.filter(t => t.mode === "GIFT").length
        }
      };

      localStorage.setItem("SO_TICKET_USE", JSON.stringify(payload));

      // 여기서 결제 화면으로 이동 (3번째 페이지 만들면 이 링크만 바꾸면 됨)
      alert("결제 화면으로 넘어갈 준비 완료!\n(현재는 payload만 저장해둠: localStorage 'SO_TICKET_USE')");
      // location.href = "ticket_pay.html";
    });

    renderSummary();
    renderTickets();
  </script>
</body>
</html>
